<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Mathématiques</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* Menu de navigation entre les classes */
        .nav-classes {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            flex-wrap: wrap; /* S'adapte sur téléphone */
        }

        .nav-btn {
            background-color: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .nav-btn.active, .nav-btn:hover {
            background-color: var(--accent-color);
            color: var(--text-main);
            border-color: var(--accent-color);
        }

        .chapter-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .chapter-title {
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #1a2333;
            border-bottom: 1px solid var(--border-color);
        }

        .chapter-content {
            padding: 8px 16px;
        }

        .file-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .file-row:last-child {
            border-bottom: none;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .file-name {
            font-weight: 500;
            color: var(--text-main);
            text-decoration: none;
            word-break: break-word;
        }

        .file-name:hover {
            color: var(--accent-color);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .badge-cours { background-color: #1e3a8a; color: #93c5fd; }
        .badge-exercices { background-color: #064e3b; color: #6ee7b7; }
        .badge-corriges { background-color: #701a75; color: #f5d0fe; }
        .badge-infographie { background-color: #7c2d12; color: #ffedd5; }
        .badge-default { background-color: #334155; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="page-title">Mes Cours de Mathématiques</h1>
    
    <div class="nav-classes" id="nav-container"></div>
    
    <div id="chapters-container"></div>
</div>
